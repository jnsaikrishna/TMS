name: Upload Manual XML to Testsigma

on:
  workflow_dispatch:   # manual trigger

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      TESTSIGMA_API_TOKEN: ${{ secrets.TESTSIGMA_API_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify XML file
      run: |
        echo "Checking files..."
        ls -l

    - name: Upload to Testsigma
      run: |
        echo "Uploading XML..."

        curl --location 'https://test-management.testsigma.com/api/v1/projects/588d8a8c-cdae-4e44-975c-a58fed8e761f/junit-import/test-run/DTP-R-104' \
        --header "Authorization: Bearer $TESTSIGMA_API_TOKEN" \
        --form "junit_xml=@132.xml"
