- name: Upload to Testsigma (Debug Mode)
  run: |
    echo "Uploading XML..."

    ls -l 132.xml
    wc -c 132.xml

    response=$(curl --location \
      --write-out "HTTPSTATUS:%{http_code}" \
      --silent \
      'https://test-management.testsigma.com/api/v1/projects/588d8a8c-cdae-4e44-975c-a58fed8e761f/junit-import/test-run/DTP-R-104' \
      --header "Authorization: Bearer $TESTSIGMA_API_TOKEN" \
      --form "junit_xml=@132.xml")

    body=$(echo "$response" | sed -e 's/HTTPSTATUS\:.*//g')
    status=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')

    echo "Status: $status"
    echo "Response: $body"

    if [ "$status" -ne 200 ]; then
      echo "❌ Upload failed"
      exit 1
    fi
