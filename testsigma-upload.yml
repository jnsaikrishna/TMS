name: Run Tests & Upload to Testsigma

on:
  push:
    branches: [ main ]  # Or your preferred branch

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      TESTSIGMA_API_TOKEN: ${{ secrets.TESTSIGMA_API_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install unittest-xml-reporting

    - name: Run tests and generate XML report
      run: |
        mkdir -p test-results
        python3 -m xmlrunner discover -o test-results

    - name: Upload to Testsigma TMS
      run: |
        echo "Uploading result to Testsigma..."
        curl --location 'https://test-management.testsigma.com/api/v1/projects/588d8a8c-cdae-4e44-975c-a58fed8e761f/junit-imports/5f5a892e-594b-4ee3-b5bd-e6cfe194b49e/status' \
--header 'Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJUTVMiLCJzdWIiOiI2ZGU0YmI3MC03ODQxLTQ2NjktYmM4NC1lYmYyOGM1ODY2ZDIiLCJuYmYiOjE3NzU2MjI5MDQsImlhdCI6MTc3NTYyMjkwNCwiaWRfc2Vzc2lvbl9yZV92YWxpZGF0ZSI6MH0.2tA96HYdd28QcMV0MUEaoHrBmgHpDbR9CSsNAJGF7Bw' \
--header 'Content-Type: application/json'
