- name: Upload to Testsigma (RAW DEBUG)
  run: |
    FILE_PATH="$GITHUB_WORKSPACE/132.xml"

    echo "===== FILE INFO ====="
    ls -l "$FILE_PATH"
    wc -c "$FILE_PATH"

    echo "===== CURL REQUEST ====="
    curl -v \
      -X POST \
      'https://test-management.testsigma.com/api/v1/projects/588d8a8c-cdae-4e44-975c-a58fed8e761f/junit-import/test-run/DTP-R-104' \
      -H "Authorization: Bearer $TESTSIGMA_API_TOKEN" \
      -F "junit_xml=@$FILE_PATH" \
      -F "type=junit"
